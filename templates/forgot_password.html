{% extends "base.html" %}

{% block title %}Reset Password - AdvoSphere Legal Assistant{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1 class="auth-title">Reset Password</h1>
            <p class="auth-subtitle">Verify email and change account password</p>
        </div>
        
        <form action="{{ url_for('auth.forgot_password') }}" method="POST">
            <div class="form-group">
                <label class="form-label" for="email">Registered Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="name@example.com" value="{{ email or '' }}" required autofocus>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" class="form-control" placeholder="Letters and numbers, min 6 chars" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary mt-2" style="width:100%;">
                <i class="fa-solid fa-key"></i> Reset & Update Password
            </button>
        </form>
        
        <div class="auth-footer">
            Remembered details? <a href="{{ url_for('auth.login') }}">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
