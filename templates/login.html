{% extends "base.html" %}

{% block title %}Login - AdvoSphere Legal Assistant{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to access your dashboard and legal tools</p>
        </div>
        
        <form action="{{ url_for('auth.login') }}" method="POST">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="name@example.com" value="{{ email or '' }}" required autofocus>
            </div>
            
            <div class="form-group" style="position: relative;">
                <label class="form-label" for="password">
                    Password
                    <a href="{{ url_for('auth.forgot_password') }}" class="forgot-pwd-link">Forgot?</a>
                </label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary mt-2" style="width:100%;">
                <i class="fa-solid fa-right-to-bracket"></i> Sign In
            </button>
        </form>
        
        <div class="auth-footer">
            Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a>
        </div>
    </div>
</div>
{% endblock %}
