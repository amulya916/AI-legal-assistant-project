apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ailegalproject-db-pvc
  labels:
    app: ailegalproject
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ailegalproject-uploads-pvc
  labels:
    app: ailegalproject
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
